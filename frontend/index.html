<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ARKAI</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.11.1/styles/vs2015.min.css" />
  <link rel="stylesheet" href="./styles.css" />
</head>

<body>
  <div class="shell">
    <header class="topbar">
      <div>
        <p class="eyebrow">Adaptive learning assistant</p>
        <h1>ARKAI</h1>
      </div>
      <span class="status-pill">Connected to local agent API</span>
    </header>

    <main>
      <section class="panel chat">
        <div class="chat-header">
          <div>
            <p class="section-label">Session</p>
            <h2>Study console</h2>
          </div>
          <div class="header-actions">
            <button id="new-session-button" class="ghost-button" type="button">New session</button>
            <button id="change-gmail-button" class="ghost-button" type="button">Change Gmail</button>
            <button id="seed-button" class="ghost-button" type="button">Use example</button>
          </div>
        </div>

        <div id="messages" class="messages" aria-live="polite">
          <div class="empty-state">
            Let's begin your Journey!
          </div>
        </div>

        <form id="chat-form" class="composer">
          <div class="composer-inner">
            <textarea id="prompt" name="prompt" rows="1"
              placeholder="Example: Teach me Python loops in 15 minutes with one exercise."></textarea>
            <button id="submit-button" class="primary-button" type="submit">
              <span class="button-text">Send</span>
              <span class="button-loader" aria-hidden="true"></span>
            </button>
          </div>
        </form>
      </section>
    </main>
  </div>

  <div id="username-modal" class="modal-backdrop" aria-hidden="true">
    <div class="modal-card">
      <p class="section-label">Profile</p>
      <h2 class="modal-title">Enter your Gmail</h2>
      <p class="modal-text">
        This Gmail will identify you in chat and will be used for Google Docs, Calendar, and
        Tasks authorization.
      </p>
      <form id="username-form" class="modal-form">
        <input id="username-input" name="username" type="email" maxlength="120" placeholder="you@gmail.com"
          autocomplete="email" />
        <button id="username-submit" class="primary-button" type="submit">Continue</button>
      </form>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <script src="./script.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.11.1/highlight.min.js"></script>
</body>

</html>
